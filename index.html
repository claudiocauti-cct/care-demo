ISTRUZIONE OPERATIVA:
Analizza il documento fornito sotto e valuta l'aspetto specifico I1 PROCEDURALE (Compliance e requisiti formali) focalizzandoti ESCLUSIVAMENTE sui requisiti formali, procedurali, sull'adeguatezza organizzativa e legislativa del progetto. Ignora il merito o il dettaglio tecnico.

REDAZIONE DEL VERDETTO:
Determina il voto corrispondente per questo layer tra uno dei seguenti valori esclusivi:
- A (Ammissibile): Completo, coerente e sicuro per gli standard.
- Rv (Rivedibile): Presenta lacune correggibili, richiede un'emendazione o un affinamento.
- E (Inammissibile/Veto): Grave anomalia strutturale, falla bloccante o assenza totale del requisito richiesto.
- NV (Non Valutabile / Astensione): deve essere riservato a vizi oggettivi dell'input (documento assente, illeggibile, corrotto, troncato, o non pertinente nella sua interezza); l'assenza nel documento di contenuti attinenti all'archetipo non è motivo di astensione ma una carenza del costrutto da votare Rv o E con prescrizione.


ISTRUZIONI PER IL FORMATO DI OUTPUT:
Assicurati che la struttura dell'output di ogni archetipo sia esattamente la seguente:

VOTO: [Scegli tra: A / Rv+ / Rv / E / NV]

KAC:
**KEY ASSUMPTIONS CHECK (KAC)**
Identifica le 2-3 assunzioni implicite più rilevanti nel layer che stai valutando. Per ciascuna indica: S (supportata dall'evidenza nel testo) / C (condizionata da fattori non esplicitati) / U (non supportata).
Dichiara alla fine del blocco KAC: "Assunzioni U rilevate su questo layer: __"


STEELMANNING (OPZIONALE):
**STEELMANNING**
Costruisci il caso più forte possibile CONTRO la tua valutazione sul questo layer specifico. Non la critica finale: il test di resistenza massima. Poi dichiara: "La valutazione regge? [sì / no / in parte — specifica in una riga]"

TIPO FRAGILITÀ:
[STRUTTURALE / OPERATIVA / SUPERFICIALE]
(Classifica la criticità principale con uno solo tra:
- STRUTTURALE: richiede cambiare l'impianto, non recuperabile in revisione minore → giustifica voto E
- OPERATIVA: impatta l'esecuzione senza cambiare l'impianto → giustifica voto Rv o Rv+
